name: Deploy V2 (Service Repo)

on:
  workflow_call:
    inputs:
      runner-size:
        required: false
        type: string
        description: "Runner to use for the job (normal, or large)"
        default: "normal"
      use-blacksmith-runners:
        required: false
        type: boolean
        default: false
        description: "Run on Blacksmith arm64 cloud runners instead of the self-hosted linux-arm64 runners."
      # DEPRECATED (no-op): all builds and CI run on arm64. Retained for backwards
      # compatibility with callers still passing it; the value is ignored and this
      # input will be removed in a future release.
      architecture:
        required: false
        type: string
        description: "[DEPRECATED] Ignored - all builds and CI run on arm64. No-op kept for backwards compatibility; will be removed in a future release."
        default: "arm64"
      stage:
        required: true
        type: string
        description: 'stage being released (dev,staging,production)'
      service-name:
        required: true
        type: string
        description: 'Proper name for your service i.e OCPP Service, Vehicle Service'
      service-emoji:
        required: true
        type: string
        description: 'An emoji to identify your service by :)'
      service-identifier:
        required: true
        type: string
        description: 'Identifier of the service being released i.e ocpp, vehicle, server, wallet.'
      region:
        required: false
        type: string
        default: "eu-west-1"
        description: 'AWS region to deploy to'
      docker-file-name:
        required: false
        type: string
        description: Name of the docker file to be built
        default: "Dockerfile"
      additional-build-args:
        required: false
        type: string
        description: 'Additional build arguments for Docker'
      ecr-repository-name:
        required: false
        type: string
        description: 'ECR repository name override'
      docker-compose-path:
        required: false
        type: string
        description: 'File path of the docker compose file'
      helm-values-path:
        required: false
        type: string
        description: 'Path to helm values directory (default: helm/{service-identifier}/{stage}/app)'
      repository-name:
        required: false
        type: string
        description: 'Repository name override (default: service-{service-identifier})'
      argocd-server:
        required: false
        type: string
        description: 'ArgoCD server URL (e.g., argocd.monta.app) for deployment monitoring'
      git-sha:
        required: false
        type: string
        description: 'Git SHA to checkout and build from. Defaults to the triggering commit SHA.'
      wait-for-argocd-sync:
        required: false
        type: boolean
        default: true
        description: 'Whether to block the workflow on ArgoCD sync becoming healthy. Set to false to fire-and-forget the deployment (the manifest commit still happens; only the wait step is skipped).'
    secrets:
      AWS_ACCOUNT_ID:
        required: true
        description: 'AWS Account ID for ECR and deployment access'
      MANIFEST_REPO_PAT:
        required: true
        description: 'GitHub PAT to commit/push to kube-manifests repo'
      SLACK_APP_TOKEN:
        required: false
        description: 'DEPRECATED: no longer used. Kept only so existing callers do not fail validation; remove it from your secrets block.'
      SENTRY_AUTH_TOKEN:
        required: false
        description: 'Sentry auth token, passed as Docker build secret'
      FARO_API_KEY:
        required: false
        description: 'Grafana Faro API key for source-map upload, passed as Docker build secret'
      AWS_CDN_ACCESS_KEY_ID:
        required: false
        description: 'CDN access key ID for S3 access, injected into Docker image'
      AWS_CDN_SECRET_ACCESS_KEY:
        required: false
        description: 'CDN secret access key for S3 access, injected into Docker image'
      TEST_ENV_FILE:
        required: false
        description: 'Environment variables for tests in .env format'
      ARGOCD_TOKEN:
        required: false
        description: 'ArgoCD authentication token (required if auto-sync is enabled)'
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:
        required: false
        description: 'Encryption key for Next.js Server Actions, passed as Docker build secret'

    outputs:
      stage:
        description: 'Stage that was deployed to (dev,staging,production)'
        value: ${{ jobs.deploy.outputs.stage }}
      docker-image:
        description: 'Docker image repository path'
        value: ${{ jobs.deploy.outputs.docker-image }}
      previous-image-tag:
        description: 'Docker image tag before the deployment (for rollback reference)'
        value: ${{ jobs.deploy.outputs.previous-image-tag }}
      image-tag:
        description: 'Docker image tag that was deployed'
        value: ${{ jobs.deploy.outputs.image-tag }}
      deployment-start-time:
        description: 'ISO 8601 timestamp when ArgoCD started the sync (only if auto-sync enabled)'
        value: ${{ jobs.deploy.outputs.deployment-start-time }}
      deployment-end-time:
        description: 'ISO 8601 timestamp when deployment became healthy (only if auto-sync enabled)'
        value: ${{ jobs.deploy.outputs.deployment-end-time }}
      deployment-url:
        description: 'Direct URL to the application in ArgoCD UI (only if auto-sync enabled)'
        value: ${{ jobs.deploy.outputs.deployment-url }}

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  slack-token-deprecation:
    name: Deprecation check
    runs-on: ubuntu-latest
    steps:
      - name: Warn if deprecated SLACK_APP_TOKEN is provided
        env:
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
        run: |
          if [ -n "$SLACK_APP_TOKEN" ]; then
            echo "::warning title=Deprecated secret::SLACK_APP_TOKEN is deprecated and no longer used by this workflow. Remove it from the secrets block of your caller workflow."
          fi

  build:
    name: Build
    uses: ./.github/workflows/component-build.yml
    with:
      runner-size: ${{ inputs.runner-size }}
      use-blacksmith-runners: ${{ inputs.use-blacksmith-runners }}
      stage: ${{ inputs.stage }}
      service-name: ${{ inputs.service-name }}
      service-emoji: ${{ inputs.service-emoji }}
      service-identifier: ${{ inputs.service-identifier }}
      region: ${{ inputs.region }}
      docker-file-name: ${{ inputs.docker-file-name }}
      additional-build-args: ${{ inputs.additional-build-args }}
      ecr-repository-name: ${{ inputs.ecr-repository-name }}
      git-sha: ${{ inputs.git-sha }}
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      FARO_API_KEY: ${{ secrets.FARO_API_KEY }}
      AWS_CDN_ACCESS_KEY_ID: ${{ secrets.AWS_CDN_ACCESS_KEY_ID }}
      AWS_CDN_SECRET_ACCESS_KEY: ${{ secrets.AWS_CDN_SECRET_ACCESS_KEY }}
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}

  deploy:
    name: Deploy
    needs:
      - build
    if: ${{ always() && needs.build.result == 'success' }}
    uses: ./.github/workflows/component-deploy-v2.yml
    with:
      service-name: ${{ inputs.service-name }}
      service-emoji: ${{ inputs.service-emoji }}
      service-identifier: ${{ inputs.service-identifier }}
      stage: ${{ inputs.stage }}
      image-tag: ${{ needs.build.outputs.image-tag }}
      helm-values-path: ${{ inputs.helm-values-path }}
      repository-name: ${{ inputs.repository-name }}
      argocd-server: ${{ inputs.argocd-server }}
      wait-for-argocd-sync: ${{ inputs.wait-for-argocd-sync }}
    secrets:
      MANIFEST_REPO_PAT: ${{ secrets.MANIFEST_REPO_PAT }}
      ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
