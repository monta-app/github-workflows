name: Initialize

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Proper name for your service i.e OCPP Service, Vehicle Service'
      service-emoji:
        required: true
        type: string
        description: 'An emoji to identify your service by :)'
    secrets:
      SLACK_APP_TOKEN:
        required: true
        description: 'Slack app token'
    outputs:
      slack-message-id:
        description: 'Slack message ID for subsequent updates'
        value: ${{ jobs.initialize.outputs.slack-message-id }}
      slack-channel-id:
        description: 'Slack channel ID for subsequent updates'
        value: ${{ jobs.initialize.outputs.slack-channel-id }}

permissions:
  contents: read

jobs:
  initialize:
    name: Initialize
    runs-on: linux-arm64
    timeout-minutes: 5
    outputs:
      slack-message-id: ${{ steps.send-slack-message.outputs.slack-message-id }}
      slack-channel-id: ${{ steps.send-slack-message.outputs.slack-channel-id }}
    steps:
      - name: Enrich event for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # workflow_dispatch events don't include commit info, causing
          # null Committer/Message/Change in Slack notifications.
          # Fetch HEAD commit info and write a push-compatible event file
          # so the slack-notifier-cli can parse it.
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" \
            --jq '{
              head_commit: {
                id: .sha,
                message: .commit.message,
                author: .commit.author,
                committer: .commit.committer
              },
              pusher: {
                name: (.commit.author.name // "${{ github.triggering_actor }}"),
                email: (.commit.author.email // "")
              }
            }' > "$GITHUB_EVENT_PATH"

      - name: Send slack message
        id: send-slack-message
        uses: monta-app/slack-notifier-cli-action@main
        with:
          job-type: "test"
          job-status: "progress"
          service-name: ${{ inputs.service-name }}
          service-emoji: ${{ inputs.service-emoji }}
          slack-app-token: ${{ secrets.SLACK_APP_TOKEN }}
          slack-channel-id: "C01KL9FUPNK"
