name: SonarQube Analysis
on:
  workflow_call:
    inputs:
      runner-size:
        required: false
        type: string
        description: "Runner to use for the job (normal, or large)"
        default: "normal"
      architecture:
        required: false
        type: string
        description: "Runner architecture (x64 or arm64)"
        default: "x64"
      java-version:
        required: false
        type: string
        default: '21'
      gradle-module:
        required: false
        type: string
        description: 'Name of the gradle module being tested'
      gradle-args:
        required: false
        type: string
        default: "--no-daemon --parallel"
        description: 'Additional Gradle arguments'
    secrets:
      TAILSCALE_AUTHKEY:
        required: false
        description: "Tailscale auth key. When set, the runner joins the tailnet so it can reach the self-hosted SonarQube. Leave unset to keep scanning SonarCloud."
      GHL_USERNAME:
        required: true
        description: "Github Username (Gradle plugin)"
      GHL_PASSWORD:
        required: true
        description: "Github Password (Gradle plugin)"
      SONAR_TOKEN:
        required: true
        description: "Sonar token (Optional, won't publish to sonar if not present)"
jobs:
  setup:
    name: Setup
    runs-on: linux-arm64
    outputs:
      runner-name: ${{ steps.runner.outputs.runner-name }}
    steps:
      - name: Get runner name
        id: runner
        uses: monta-app/github-workflows/.github/actions/runner-size-converter@main
        with:
          runner-size: ${{ inputs.runner-size }}
          architecture: ${{ inputs.architecture }}
  sonar-cloud:
    name: SonarQube Analysis
    needs: setup
    runs-on: ${{ needs.setup.outputs.runner-name }}
    timeout-minutes: 30
    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Shallow clones should be disabled for a better relevancy of analysis
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: corretto
          java-version: ${{ inputs.java-version }}
      - name: Restore Gradle cache
        id: gradle-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-main-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-gradle-main-
      - name: Cache SonarQube packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      # The self-hosted SonarQube lives behind the Monta VPN, so the runner
      # needs to join the tailnet before the scan step can reach it. Skipped
      # automatically for repos still on SonarCloud (no TAILSCALE_AUTHKEY passed).
      - name: Tailscale
        if: ${{ env.TAILSCALE_AUTHKEY != '' }}
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade # v3.3.0
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          hostname: "github-${{ github.run_id }}"
          args: "--login-server https://headscale.monta.com --accept-routes"
      - name: Build and analyze
        env:
          GHL_USERNAME: ${{ secrets.GHL_USERNAME }}
          GHL_PASSWORD: ${{ secrets.GHL_PASSWORD }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        uses: monta-app/github-workflows/.github/actions/gradle-multi-module@main
        with:
          gradle-module: ${{ inputs.gradle-module }}
          gradle-tasks: 'test koverXmlReport sonar'
          gradle-args: ${{ inputs.gradle-args }}
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-reports-${{ inputs.gradle-module || 'root' }}
          path: |
            **/build/reports/kover/html/**
            **/build/reports/problems/**
          if-no-files-found: ignore
          retention-days: 30
      - name: Save Gradle cache
        if: ${{ always() && github.ref == 'refs/heads/main' && steps.gradle-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-main-${{ github.sha }}
