name: Build
on:
  workflow_call:
    inputs:
      runner-size:
        required: false
        type: string
        default: 'normal'
        description: 'Runner size (normal or large)'
      use-blacksmith-runners:
        required: false
        type: boolean
        default: false
        description: "Run on Blacksmith arm64 cloud runners instead of the self-hosted linux-arm64 runners."
      stage:
        required: true
        type: string
        description: 'stage being released (dev,staging,production)'
      service-name:
        required: true
        type: string
        description: 'Proper name for your service i.e OCPP Service, Vehicle Service'
      service-emoji:
        required: true
        type: string
        description: 'An emoji to identify your service by :)'
      service-identifier:
        required: true
        type: string
        description: 'Identifier of the service being released i.e ocpp, vehicle, server, wallet.'
      region:
        required: false
        type: string
        default: "eu-west-1"
        description: 'AWS region to deploy to (defaults to "eu-west-1")'
      docker-file-name:
        required: false
        type: string
        description: Name of the docker file to be built
        default: "Dockerfile"
      additional-build-args:
        required: false
        type: string
        description: "Optional additional build arguments to pass to the Docker build process. Specify each argument on a new line in the format KEY=VALUE."
      ecr-repository-name:
        required: false
        type: string
        description: 'Custom ECR repository name. If not specified, defaults to service-identifier'
      git-sha:
        required: false
        type: string
        description: 'Git SHA to checkout and build from. Defaults to the triggering commit SHA.'
    secrets:
      AWS_ACCOUNT_ID:
        required: true
        description: 'AWS account id'
      GHL_USERNAME:
        required: false
        description: 'Github Username (Required for Kotlin builds)'
      GHL_PASSWORD:
        required: false
        description: 'Github Password (Required for Kotlin builds)'
      SENTRY_AUTH_TOKEN:
        required: false
        description: "Sentry Auth Token, this value is injected into the secrets of a docker image"
      FARO_API_KEY:
        required: false
        description: "Grafana Faro API key for source-map upload, this value is injected into the secrets of a docker image"
      AWS_CDN_ACCESS_KEY_ID:
        required: false
        description: "AWS CDN Secret Access ID, this value is injected into the secrets of a docker image"
      AWS_CDN_SECRET_ACCESS_KEY:
        required: false
        description: "AWS CDN Secret Access Key, this value is injected into the secrets of a docker image"
      LOKALISE_TOKEN:
        required: false
        description: 'Lokalise token for Lokalise API, this value is injected into the secrets of a docker image'
      LOKALISE_PROJECT_ID:
        required: false
        description: 'Lokalise project ID for Lokalise API, this value is injected into the secrets of a docker image'
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:
        required: false
        description: 'Encryption key for Next.js Server Actions, this value is injected into the secrets of a docker image'
    outputs:
      image-tag:
        description: 'The image tag that was built'
        value: ${{ jobs.setup.outputs.image-tag }}

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    name: Setup
    runs-on: linux-arm64
    timeout-minutes: 5
    outputs:
      runner: ${{ steps.runner.outputs.runner-name }}
      image-tag: ${{ inputs.git-sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.git-sha || github.sha }}
      - name: Get runner name
        id: runner
        uses: monta-app/github-workflows/.github/actions/runner-size-converter@main
        with:
          runner-size: ${{ inputs.runner-size }}
          use-blacksmith-runners: ${{ inputs.use-blacksmith-runners }}
  # Blacksmith path: build on a Blacksmith arm64 cloud runner. Its sticky-disk builder
  # hydrates the layer cache from prior runs, so no registry cache directives are needed.
  build-blacksmith:
    name: Build (Blacksmith)
    needs: setup
    if: ${{ inputs.use-blacksmith-runners }}
    runs-on: ${{ needs.setup.outputs.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.git-sha || github.sha }}
      - name: Configure AWS credentials via assumed role
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecr-put-image
          role-session-name: push-new-image-to-${{ inputs.service-identifier }}-${{inputs.stage}}
          aws-region: ${{ inputs.region }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository-name || format('{0}-{1}', inputs.service-identifier, inputs.stage) }}
          tags: |
            type=raw,value=${{ inputs.git-sha || github.sha }}
            type=raw,value=latest
      - name: Set up Blacksmith Docker builder
        uses: useblacksmith/setup-docker-builder@ab5c1da94f53f5cd75c1038092aa276dddfccbba # v1
      - name: Build and push
        id: build
        uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8 # v2
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          context: .
          file: ./${{ inputs.docker-file-name }}
          push: true
          platforms: linux/arm64
          # provenance/sbom off (with BUILDX_NO_DEFAULT_ATTESTATIONS=1 above) so the
          # pushed tag is a plain single-arch image, not a manifest list.
          provenance: false
          sbom: false
          build-args: |
            ${{ inputs.additional-build-args }}
          labels: |
            GITHUB_RUN_ID=${{ github.run_id }}
            ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          secrets: |
            GHL_USERNAME=${{ secrets.GHL_USERNAME }}
            GHL_PASSWORD=${{ secrets.GHL_PASSWORD }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            FARO_API_KEY=${{ secrets.FARO_API_KEY }}
            AWS_CDN_ACCESS_KEY_ID=${{ secrets.AWS_CDN_ACCESS_KEY_ID }}
            AWS_CDN_SECRET_ACCESS_KEY=${{ secrets.AWS_CDN_SECRET_ACCESS_KEY }}
            LOKALISE_TOKEN=${{ secrets.LOKALISE_TOKEN }}
            LOKALISE_PROJECT_ID=${{ secrets.LOKALISE_PROJECT_ID }}
            NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}

  # Self-hosted path: build on a self-hosted linux-arm64 runner with docker buildx and
  # a registry-backed BuildKit cache in the ECR repo.
  build-self-hosted:
    name: Build (self-hosted)
    needs: setup
    if: ${{ !inputs.use-blacksmith-runners }}
    runs-on: ${{ needs.setup.outputs.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.git-sha || github.sha }}
      - name: Configure AWS credentials via assumed role
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecr-put-image
          role-session-name: push-new-image-to-${{ inputs.service-identifier }}-${{inputs.stage}}
          aws-region: ${{ inputs.region }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository-name || format('{0}-{1}', inputs.service-identifier, inputs.stage) }}
          tags: |
            type=raw,value=${{ inputs.git-sha || github.sha }}
            type=raw,value=latest
      # registry cache export needs the docker-container buildx driver (the default
      # docker driver does not support cache-to).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        with:
          context: .
          file: ./${{ inputs.docker-file-name }}
          push: true
          platforms: linux/arm64
          # provenance/sbom off (with BUILDX_NO_DEFAULT_ATTESTATIONS=1 above) so the
          # pushed tag is a plain single-arch image, not a manifest list.
          provenance: false
          sbom: false
          # Registry-backed BuildKit cache (mode=max) in the same ECR repo, covered by
          # the existing ecr-put-image IAM permissions.
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository-name || format('{0}-{1}', inputs.service-identifier, inputs.stage) }}:buildcache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository-name || format('{0}-{1}', inputs.service-identifier, inputs.stage) }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true
          build-args: |
            ${{ inputs.additional-build-args }}
          labels: |
            GITHUB_RUN_ID=${{ github.run_id }}
            ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          secrets: |
            GHL_USERNAME=${{ secrets.GHL_USERNAME }}
            GHL_PASSWORD=${{ secrets.GHL_PASSWORD }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            FARO_API_KEY=${{ secrets.FARO_API_KEY }}
            AWS_CDN_ACCESS_KEY_ID=${{ secrets.AWS_CDN_ACCESS_KEY_ID }}
            AWS_CDN_SECRET_ACCESS_KEY=${{ secrets.AWS_CDN_SECRET_ACCESS_KEY }}
            LOKALISE_TOKEN=${{ secrets.LOKALISE_TOKEN }}
            LOKALISE_PROJECT_ID=${{ secrets.LOKALISE_PROJECT_ID }}
            NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
