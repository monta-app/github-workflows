name: Deploy PR Preview

on:
  workflow_call:
    inputs:
      app-name:
        description: Application name. Used as the ECR tag scope, k8s namespace, preview hostname, PR comment header, and the turbo workspace package name for change detection.
        required: true
        type: string
      ecr-repository:
        description: ECR repository name
        required: true
        type: string
      base-domain:
        description: Base domain for preview URLs
        required: false
        type: string
        default: pr.monta.app
      docker-file:
        description: Path to the app's Dockerfile (relative to the caller repo root)
        required: true
        type: string
      build-command:
        description: Build target/stage passed to the Dockerfile (e.g. staging, production)
        required: true
        type: string
      env-vars:
        description: Inline KEY=VALUE env vars (one per line) injected as container env on the deployment
        required: false
        type: string
        default: ""
      helm-chart-path:
        description: Path to the Helm chart (relative to the caller repo root)
        required: false
        type: string
        default: .github/helm
    secrets:
      ECR_AWS_ACCESS_KEY_ID:
        required: true
        description: AWS access key ID for ECR
      ECR_AWS_SECRET_ACCESS_KEY:
        required: true
        description: AWS secret access key for ECR
      STAGING_KUBECONFIG_BASE64:
        required: true
        description: Base64-encoded kubeconfig for the staging cluster
      STAGING_KUBECONFIG:
        required: true
        description: Raw kubeconfig content for the staging cluster
      SENTRY_AUTH_TOKEN:
        required: false
        description: Sentry auth token for source map upload (optional)

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  check-changes:
    name: Check Changes
    if: github.event.action != 'closed'
    runs-on: linux-arm64
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Decide whether to deploy
        id: decide
        run: |
          set -euo pipefail

          COMPARE_REF=$(git log --format='%H %ae' HEAD~1 | awk '$2 != "action@github.com" && $2 !~ /github-actions/ {print $1; exit}' || true)
          if [ -z "$COMPARE_REF" ]; then
            echo "No non-bot commit found in history, deploying to be safe"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing against: $COMPARE_REF"

          EXIT_CODE=0
          pnpx turbo-ignore "${{ inputs.app-name }}" --fallback="$COMPARE_REF" || EXIT_CODE=$?

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "No changes detected for ${{ inputs.app-name }}, skipping deployment"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected for ${{ inputs.app-name }}, proceeding with deployment"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy Preview
    needs: [ check-changes ]
    if: github.event.action != 'closed' && !cancelled() && (needs.check-changes.outputs.should_deploy == 'true')
    runs-on: linux-x64
    timeout-minutes: 30
    env:
      APP_NAME: ${{ inputs.app-name }}
      BASE_DOMAIN: ${{ inputs.base-domain }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      DEPLOY_URL: https://${{ inputs.app-name }}-${{ github.event.pull_request.number }}.${{ inputs.base-domain }}
    steps:
      - name: Get short SHA
        id: sha
        run: echo "short=${HEAD_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
        id: fc
        with:
          issue-number: ${{ env.PR_NUMBER }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- pr-preview:${{ inputs.app-name }} -->'

      - name: Comment — deploying
        id: comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ env.PR_NUMBER }}
          edit-mode: replace
          body: |
            <!-- pr-preview:${{ inputs.app-name }} -->
            ### 🚀 Preview · `${{ inputs.app-name }}`

            | | |
            |---|---|
            | **Status** | 🟡 Deploying… |
            | **Commit** | [`${{ steps.sha.outputs.short }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ env.HEAD_SHA }}) |
            | **Job** | [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          aws-access-key-id: ${{ secrets.ECR_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ECR_AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ${{ inputs.docker-file }}
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}:${{ env.HEAD_SHA }}
          build-args: |
            APP_NAME=${{ inputs.app-name }}
            BUILD_ENV=${{ inputs.build-command }}
          secrets: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup kubectl
        uses: tale/kubectl-action@a3b800d623aebc530384fe67de1b337332e23290 # v1.4.0
        with:
          base64-kube-config: ${{ secrets.STAGING_KUBECONFIG_BASE64 }}
          kubectl-version: v1.22.6

      - name: Create namespace
        continue-on-error: true
        run: kubectl create ns "${{ inputs.app-name }}-pr-${{ env.PR_NUMBER }}"

      - name: Prepare Helm values
        id: prepare-values
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          INPUT_ENV_VARS: ${{ inputs.env-vars }}
          SENTRY_ENVIRONMENT: pr-${{ env.PR_NUMBER }}
        run: |
          HELM_VALUES="app:
            name: ${{ inputs.app-name }}-pr-${{ env.PR_NUMBER }}
            version: ${{ env.HEAD_SHA }}
          image:
            repository: $ECR_REGISTRY/${{ inputs.ecr-repository }}
            tag: ${{ env.HEAD_SHA }}
          ingress:
            enabled: true
            hosts:
              - host: ${{ inputs.app-name }}-${{ env.PR_NUMBER }}.${{ inputs.base-domain }}
                paths:
                  - /
            tls:
              - hosts:
                - ${{ inputs.app-name }}-${{ env.PR_NUMBER }}.${{ inputs.base-domain }}"

          # Append a single KEY=VALUE pair under env:. Skips blank/comment keys
          # and strips surrounding quotes from the value. Opens the env: header
          # on first call.
          append_env_var() {
            local key="$1"
            local value="$2"
            if [ -z "$key" ] || [[ "$key" =~ ^# ]]; then
              return 0
            fi
            value=$(echo "$value" | sed 's/^"\(.*\)"$/\1/' | sed "s/^'\(.*\)'$/\1/")
            if ! echo "$HELM_VALUES" | grep -q "^env:$"; then
              HELM_VALUES="${HELM_VALUES}
          env:"
            fi
            HELM_VALUES="${HELM_VALUES}
            $key: \"$value\""
          }

          if [ -n "$INPUT_ENV_VARS" ]; then
            while IFS='=' read -r key value; do
              append_env_var "$key" "$value"
            done <<< "$INPUT_ENV_VARS"
          fi

          # Tag preview events distinctly from shared staging traffic.
          append_env_var "SENTRY_ENVIRONMENT" "$SENTRY_ENVIRONMENT"

          echo "values<<EOF" >> "$GITHUB_OUTPUT"
          echo "$HELM_VALUES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "Helm values:"
          echo "$HELM_VALUES"

      - name: Deploy with Helm
        uses: vimeda/helm@8fb24318e538359380b6acaaee9aa686d5f0c5cb # v1.7.0
        env:
          KUBECONFIG_FILE: ${{ secrets.STAGING_KUBECONFIG }}
        with:
          release: ${{ inputs.app-name }}-pr-${{ env.PR_NUMBER }}
          namespace: ${{ inputs.app-name }}-pr-${{ env.PR_NUMBER }}
          chart: ${{ inputs.helm-chart-path }}
          token: ${{ github.token }}
          atomic: false
          values: ${{ steps.prepare-values.outputs.values }}

      - name: Comment — success
        if: success()
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.comment.outputs.comment-id }}
          issue-number: ${{ env.PR_NUMBER }}
          edit-mode: replace
          body: |
            <!-- pr-preview:${{ inputs.app-name }} -->
            ### 🚀 Preview · `${{ inputs.app-name }}`

            | | |
            |---|---|
            | **Status** | ✅ Live |
            | **URL** | [${{ inputs.app-name }}-${{ env.PR_NUMBER }}.${{ env.BASE_DOMAIN }}](${{ env.DEPLOY_URL }}) |
            | **Commit** | [`${{ steps.sha.outputs.short }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ env.HEAD_SHA }}) |
            | **Job** | [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

      - name: Comment — failure
        if: failure()
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.comment.outputs.comment-id }}
          issue-number: ${{ env.PR_NUMBER }}
          edit-mode: replace
          body: |
            <!-- pr-preview:${{ inputs.app-name }} -->
            ### 🚀 Preview · `${{ inputs.app-name }}`

            | | |
            |---|---|
            | **Status** | ❌ Failed |
            | **Commit** | [`${{ steps.sha.outputs.short }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ env.HEAD_SHA }}) |
            | **Job** | [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

  cleanup:
    name: Cleanup Preview
    if: github.event.action == 'closed'
    runs-on: linux-arm64
    continue-on-error: true
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Uninstall Helm release
        uses: vimeda/helm@8fb24318e538359380b6acaaee9aa686d5f0c5cb # v1.7.0
        continue-on-error: true
        env:
          KUBECONFIG_FILE: ${{ secrets.STAGING_KUBECONFIG }}
        with:
          task: 'remove'
          release: ${{ inputs.app-name }}-pr-${{ env.PR_NUMBER }}
          namespace: ${{ inputs.app-name }}-pr-${{ env.PR_NUMBER }}
          chart: ${{ inputs.helm-chart-path }}
          token: ${{ github.token }}

      - name: Delete namespace
        uses: actions-hub/kubectl@master
        continue-on-error: true
        env:
          KUBE_CONFIG: ${{ secrets.STAGING_KUBECONFIG_BASE64 }}
        with:
          args: delete ns ${{ inputs.app-name }}-pr-${{ env.PR_NUMBER }}
