name: 'Runner Size Converter'
description: 'Convert a runner size into an arm64 GitHub runner name'
author: 'Your Organization'

inputs:
  runner-size:
    description: 'Runner size (normal or large)'
    required: true
  use-blacksmith-runners:
    description: 'Run on Blacksmith arm64 cloud runners (default). Set to false to run on the self-hosted linux-arm64 runners'
    required: false
    default: 'true'

outputs:
  runner-name:
    description: 'The converted runner name'
    value: ${{ steps.convert.outputs.runner-name }}

runs:
  using: 'composite'
  steps:
    - name: Convert runner size to runner name
      id: convert
      shell: bash
      run: |
        SIZE="${{ inputs.runner-size }}"
        USE_BLACKSMITH="${{ inputs.use-blacksmith-runners }}"

        # Validate size
        case "$SIZE" in
          "normal"|"large")
            ;;
          *)
            echo "Error: Invalid runner size '$SIZE'. Must be 'normal' or 'large'"
            exit 1
            ;;
        esac

        # Resolve the runner name (arm64 only)
        if [ "$USE_BLACKSMITH" = "true" ]; then
          # Blacksmith managed arm64 cloud runners
          if [ "$SIZE" = "large" ]; then
            RUNNER_NAME="blacksmith-16vcpu-ubuntu-2404-arm"
          else
            RUNNER_NAME="blacksmith-4vcpu-ubuntu-2404-arm"
          fi
        else
          # Self-hosted arm64 runners
          RUNNER_NAME="linux-arm64"
          if [ "$SIZE" = "large" ]; then
            RUNNER_NAME="$RUNNER_NAME-xl"
          fi
        fi

        echo "runner-name=$RUNNER_NAME" >> $GITHUB_OUTPUT
        echo "Selected runner: $RUNNER_NAME"
