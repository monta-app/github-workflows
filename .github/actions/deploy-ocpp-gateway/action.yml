name: 'Deploy OCPP Gateway'
description: 'Deploy OCPP Gateway to Infra Portal'
inputs:
  service-identifier:
    description: 'Identifier of the service being released i.e ocpp-gateway'
    required: true
  stage:
    description: 'Stage being released (dev,staging,production)'
    required: true
  ocpp-gateway-replicas:
    description: 'Number of replicas for OCPP Gateway'
    required: true
  aws-account-id:
    description: 'AWS account ID'
    required: true
  infra-portal-token:
    description: 'Infra Portal token'
    required: true
  infra-portal-context:
    description: 'Kube context the infra-portal releaser should target (e.g. main-staging). Defaults to ocpp-<cluster> derived from stage.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set Infra Portal Server
      id: set-infra-portal-server
      shell: bash
      env:
        STAGE: ${{ inputs.stage }}
      run: |
        if [[ $STAGE =~ dev|staging ]]; then
          INFRA_PORTAL_HOSTNAME="infra-portal.internal.monta.app"
        else
          INFRA_PORTAL_HOSTNAME="infra-portal.monta.app"
        fi
        echo "infra-portal-hostname=$INFRA_PORTAL_HOSTNAME" >> "$GITHUB_OUTPUT"
    - name: Deploy OCPP Gateway to Infra Portal
      shell: bash
      run: |
        if [[ ${{ inputs.stage }} =~ dev|staging ]]; then
          cluster=staging
          path_prefix="/api/public"
        else
          cluster=production
          path_prefix=""
        fi
        context="${{ inputs.infra-portal-context }}"
        if [[ -z "$context" ]]; then
          context="ocpp-${cluster}"
        fi
        release_url="https://${{ steps.set-infra-portal-server.outputs.infra-portal-hostname }}${path_prefix}/${context}/${{ inputs.service-identifier }}-${{ inputs.stage }}/create-gateway-release"
        echo "Posting gateway release to ${release_url}"
        response_code=$(curl --write-out '%{http_code}' --silent -o resp_body.txt -X POST -H "Authorization: Bearer ${{ inputs.infra-portal-token }}" -H "Content-Type: application/json" -d '{"commitHash": "'"${{ github.sha }}"'", "buildNumber": "'"${{ github.run_number }}"'", "awsAccountId": "'"${{ inputs.aws-account-id }}"'", "replicas": ${{ inputs.ocpp-gateway-replicas }}}' "${release_url}")
        if [[ $response_code != "200" ]]; then
          echo "::error::$(cat resp_body.txt)"
          exit 1
        else
          cat resp_body.txt
        fi
